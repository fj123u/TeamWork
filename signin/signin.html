<!doctype html>
<html lang="fr">

    <title>TeamWork login</title>

</head>

<body>
    <h1>Se connecter</h1>

            <label for="pseudo">Pseudo</label>
            <input id="pseudo" type="text" placeholder="Ex : Dupont">
        </div>
        <div class="champ">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" placeholder="............">
        </div>
        <button type="submit">Connexion</button>
    </form>
    <br>
    <div id="erreur"></div>
    <script src="login.js"></script>
</body>

</html>
